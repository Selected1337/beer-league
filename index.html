<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Minecraft Beer Hockey League</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { background: '#ffffff', card: '#f9f9f9', text: '#000000' },
          keyframes: {
            fadeSlide: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          },
          animation: { fadeSlide: 'fadeSlide 0.5s ease-out' }
        }
      }
    }
  </script>
  <style>
    .game-card {
      min-width: 400px;
      max-width: 400px;
      flex-shrink: 0;
      border: 1px solid #111;
      border-radius: 14px;
      background: #f9f9f9;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .dark .game-card { background: #1a1a1a; border-color: #333; }

    .games-strip {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 14px;
      padding-bottom: 10px;
      scrollbar-width: thin;
      scrollbar-color: #555 transparent;
      -webkit-overflow-scrolling: touch;
    }
    .games-strip::-webkit-scrollbar { height: 5px; }
    .games-strip::-webkit-scrollbar-track { background: transparent; }
    .games-strip::-webkit-scrollbar-thumb { background: #aaa; border-radius: 4px; }

    .goals-strip {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 8px;
      padding: 4px 0 6px;
      scrollbar-width: thin;
      scrollbar-color: #555 transparent;
      -webkit-overflow-scrolling: touch;
    }
    .goals-strip::-webkit-scrollbar { height: 4px; }
    .goals-strip::-webkit-scrollbar-track { background: transparent; }
    .goals-strip::-webkit-scrollbar-thumb { background: #aaa; border-radius: 4px; }

    .goal-pill {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 7px 14px 7px 7px;
      white-space: nowrap;
    }
    .dark .goal-pill { background: #2a2a2a; border-color: #444; }
    .goal-pill img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
    .goal-pill .scorer-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .goal-pill .assist-line { font-size: 12px; color: #666; line-height: 1.3; }
    .dark .goal-pill .assist-line { color: #aaa; }

    .date-btn {
      padding: 5px 16px;
      border-radius: 999px;
      border: 1.5px solid #bbb;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #333;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .date-btn:hover { border-color: #555; background: #f0f0f0; }
    .date-btn.active { background: #111; color: #fff; border-color: #111; }
    .dark .date-btn { background: #222; color: #ccc; border-color: #444; }
    .dark .date-btn.active { background: #fff; color: #111; border-color: #fff; }

    .team-row { display: flex; justify-content: space-between; align-items: center; }
    .team-info { display: flex; align-items: center; gap: 10px; }
    .team-name { font-size: 16px; font-weight: 700; line-height: 1.2; }
    .team-sog  { font-size: 11px; color: #888; }
    .team-score { font-size: 28px; font-weight: 800; }

    .divider { border: none; border-top: 1px solid #e0e0e0; margin: 0; }
    .dark .divider { border-color: #333; }

    .sort-arrow { display: inline-block; margin-left: 4px; }
    .gold   { background-color: #ffd70022; }
    .silver { background-color: #c0c0c022; }
    .bronze { background-color: #cd7f3222; }
  </style>
</head>
<body class="bg-background text-text">

  <header class="bg-black text-white p-4 shadow-md flex justify-between items-center">
    <h1 class="text-2xl font-bold">The Minecraft Beer Hockey League</h1>
    <div class="flex items-center gap-4">
      <input id="player-search" type="text" placeholder="Search player"
             class="bg-gray-800 text-white p-1 rounded text-sm border border-gray-600"
             oninput="renderPlayers()">
      <button onclick="toggleTheme()"
              class="bg-gray-800 border border-gray-600 px-3 py-1 rounded text-sm hover:bg-gray-600 transition">
        Toggle Dark / Light
      </button>
    </div>
  </header>

  <main class="container mx-auto py-6 space-y-12 px-4">

    <section>
      <h2 class="text-xl font-semibold mb-3">Recent Games</h2>
      <div id="date-filters" class="flex flex-wrap gap-2 mb-4"></div>
      <div id="recent-games" class="games-strip"></div>
    </section>

    <section>
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-xl font-semibold">Standings</h2>
        <select id="standings-filter" class="bg-black text-white p-1 rounded text-sm">
          <option value="overall">Overall</option>
          <option value="conference">By Conference</option>
          <option value="division">By Division</option>
        </select>
      </div>
      <div id="standings-tables" class="space-y-8"></div>
    </section>

    <section>
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-xl font-semibold">Player Stats</h2>
        <select id="player-team-filter" class="bg-black text-white p-1 rounded">
          <option value="">All Teams</option>
        </select>
      </div>
      <table class="min-w-full bg-card rounded shadow text-left">
        <thead class="bg-black text-white">
          <tr>
            <th class="p-2 cursor-pointer" onclick="sortPlayers('player')">Player <span id="arrow-player" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortPlayers('team')">Team <span id="arrow-team" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortPlayers('gamesPlayed')">GP <span id="arrow-gp" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortPlayers('goals')">G <span id="arrow-goals" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortPlayers('assists')">A <span id="arrow-assists" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortPlayers('pts')">PTS <span id="arrow-pts" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortPlayers('hits')">Hits <span id="arrow-hits" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortPlayers('touches')">Touches <span id="arrow-touches" class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="player-stats-body"></tbody>
      </table>
    </section>

    <section>
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-xl font-semibold">Goalie Stats</h2>
        <select id="goalie-team-filter" class="bg-black text-white p-1 rounded">
          <option value="">All Teams</option>
        </select>
      </div>
      <table class="min-w-full bg-card rounded shadow text-left">
        <thead class="bg-black text-white">
          <tr>
            <th class="p-2 cursor-pointer" onclick="sortGoalies('player')">Goalie <span id="arrow-goalie-player" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortGoalies('team')">Team <span id="arrow-goalie-team" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortGoalies('shotsAgainst')">SA <span id="arrow-goalie-shotsAgainst" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortGoalies('goalsAgainst')">GA <span id="arrow-goalie-goalsAgainst" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortGoalies('savePct')">SV% <span id="arrow-goalie-savePct" class="sort-arrow"></span></th>
            <th class="p-2 cursor-pointer" onclick="sortGoalies('gaa')">GAA <span id="arrow-goalie-gaa" class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="goalie-stats-body"></tbody>
      </table>
    </section>

    <section>
      <h2 class="text-xl font-semibold mb-2">Player Comparison</h2>
      <div class="flex gap-4 mb-4">
        <select id="compare1" class="bg-black text-white p-1 rounded"></select>
        <select id="compare2" class="bg-black text-white p-1 rounded"></select>
      </div>
      <div id="comparison" class="grid grid-cols-2 gap-4 animate-fadeSlide"></div>
    </section>

  </main>

  <footer class="bg-black text-white p-4 text-center">
    &copy; 2025 The Minecraft Beer Hockey League | MBHL
  </footer>

  <script>
    function toggleTheme() { document.documentElement.classList.toggle('dark'); }

    let sortedPlayers = [], currentSortKey = 'pts', sortDirection = 'desc';
    let sortedGoalies = [], goalieSortKey = 'savePct', goalieSortDirection = 'desc';
    let allGames = [], allLogos = {}, allPlayers = [], activeDate = null;

    function updateSortArrows() {
      ['player','team','gp','goals','assists','pts','hits','touches'].forEach(k => {
        const el = document.getElementById(`arrow-${k}`);
        if (el) el.textContent = currentSortKey === k ? (sortDirection === 'desc' ? '↓' : '↑') : '';
      });
    }
    function updateGoalieSortArrows() {
      ['player','team','shotsAgainst','goalsAgainst','savePct','gaa'].forEach(k => {
        const el = document.getElementById(`arrow-goalie-${k}`);
        if (el) el.textContent = goalieSortKey === k ? (goalieSortDirection === 'desc' ? '↓' : '↑') : '';
      });
    }
    function sortPlayers(key) {
      if (currentSortKey === key) sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
      else { currentSortKey = key; sortDirection = 'desc'; }
      sortedPlayers.sort((a,b) => sortDirection === 'desc' ? b[key] - a[key] : a[key] - b[key]);
      updateSortArrows(); renderPlayers();
    }
    function sortGoalies(key) {
      if (goalieSortKey === key) goalieSortDirection = goalieSortDirection === 'desc' ? 'asc' : 'desc';
      else { goalieSortKey = key; goalieSortDirection = 'desc'; }
      sortedGoalies.sort((a,b) => goalieSortDirection === 'desc' ? b[key] - a[key] : a[key] - b[key]);
      updateGoalieSortArrows(); renderGoalies();
    }

    function renderPlayers() {
      const body   = document.getElementById('player-stats-body');
      const search = document.getElementById('player-search').value.toLowerCase();
      const filter = document.getElementById('player-team-filter').value;
      body.innerHTML = '';
      sortedPlayers
        .filter(p => (!filter || p.team === filter) && p.player.toLowerCase().includes(search))
        .forEach((p, i) => {
          const rowClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
          body.innerHTML += `<tr class="${rowClass} animate-fadeSlide">
            <td class="p-2"><div class="flex items-center gap-2">
              <img src="https://minotar.net/avatar/${p.player}/100.png" class="w-6 h-6 rounded">
              <a href="player.html?name=${encodeURIComponent(p.player)}" class="hover:underline text-blue-400">${p.player}</a>
            </div></td>
            <td class="p-2">${p.team}</td>
            <td class="p-2">${p.gamesPlayed}</td>
            <td class="p-2">${p.goals}</td>
            <td class="p-2">${p.assists}</td>
            <td class="p-2">${p.pts}</td>
            <td class="p-2">${p.hits}</td>
            <td class="p-2">${p.touches}</td>
          </tr>`;
        });
    }

    function renderGoalies() {
      const body   = document.getElementById('goalie-stats-body');
      const filter = document.getElementById('goalie-team-filter').value;
      body.innerHTML = '';
      sortedGoalies.filter(g => !filter || g.team === filter).forEach(g => {
        body.innerHTML += `<tr class="animate-fadeSlide">
          <td class="p-2"><div class="flex items-center gap-2">
            <img src="https://minotar.net/avatar/${g.player}/100.png" class="w-6 h-6 rounded">
            ${g.player}
          </div></td>
          <td class="p-2">${g.team}</td>
          <td class="p-2">${g.shotsAgainst}</td>
          <td class="p-2">${g.goalsAgainst}</td>
          <td class="p-2">${g.savePercentage}</td>
          <td class="p-2">${typeof g.gaa === 'number' ? g.gaa.toFixed(2) : g.gaa}</td>
        </tr>`;
      });
    }

    function renderComparison(p1, p2) {
      const container = document.getElementById('comparison');
      container.innerHTML = '';
      if (!p1 || !p2) return;
      [p1, p2].forEach(player => {
        container.innerHTML += `
          <div class="bg-gray-800 text-white p-4 rounded flex gap-4 items-center animate-fadeSlide">
            <img src="https://minotar.net/bust/${player.player}/100.png" class="rounded w-16">
            <div>
              <h3 class="text-lg font-bold mb-2">${player.player}</h3>
              <ul class="space-y-1 text-sm">
                <li><strong>Team:</strong> ${player.team}</li>
                <li><strong>GP:</strong> ${player.gamesPlayed}</li>
                <li><strong>Goals:</strong> ${player.goals}</li>
                <li><strong>Assists:</strong> ${player.assists}</li>
                <li><strong>Points:</strong> ${player.pts}</li>
                <li><strong>Hits:</strong> ${player.hits}</li>
                <li><strong>Touches:</strong> ${player.touches}</li>
              </ul>
            </div>
          </div>`;
      });
    }

    function buildGoalPills(goals, playerStats) {
      if (!goals || goals.length === 0)
        return '<span style="font-size:12px;color:#999;padding:0 4px;">No goal data</span>';
      return goals.map(goal => {
        const scorer     = goal.scorer  || 'Unknown';
        const assists    = goal.assists || 'Unassisted';
        const stat       = playerStats.find(p => p.player === scorer);
        const gTotal     = stat ? stat.goals : '—';
        const assistText = Array.isArray(assists) ? assists.join(', ') : assists;
        return `
          <div class="goal-pill">
            <a href="player.html?name=${encodeURIComponent(scorer)}" title="View ${scorer}">
              <img src="https://minotar.net/avatar/${scorer}/40" alt="${scorer}"
                   onerror="this.src='https://minotar.net/avatar/MHF_Steve/40'" />
            </a>
            <div>
              <div class="scorer-name">${scorer} (${gTotal})</div>
              <div class="assist-line">${assistText}</div>
            </div>
          </div>`;
      }).join('');
    }

    function buildGameCard(game, logos, playerStats) {
      const homeLogo  = logos[game.home.team]?.logo || '';
      const awayLogo  = logos[game.away.team]?.logo || '';
      const goalPills = buildGoalPills(game.goals, playerStats);

      const logoImg = (url, team) => url
        ? `<img src="${url}" alt="${team}" style="width:44px;height:44px;object-fit:contain;" onerror="this.style.display='none'" />`
        : `<div style="width:44px;height:44px;background:#ddd;border-radius:6px;"></div>`;

      return `
        <div class="game-card">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="background:#111;color:#fff;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.05em;">${game.status}</span>
            <span style="font-size:12px;color:#888;">${game.date}</span>
          </div>
          <hr class="divider" />
          <div class="team-row">
            <div class="team-info">
              ${logoImg(awayLogo, game.away.team)}
              <div>
                <div class="team-name">${game.away.team}</div>
                <div class="team-sog">${game.home.sog} SOG</div>
              </div>
            </div>
            <div class="team-score">${game.home.score}</div>
          </div>
          <div class="team-row">
            <div class="team-info">
              ${logoImg(homeLogo, game.home.team)}
              <div>
                <div class="team-name">${game.home.team}</div>
                <div class="team-sog">${game.away.sog} SOG</div>
              </div>
            </div>
            <div class="team-score">${game.away.score}</div>
          </div>
          <hr class="divider" />
          <div class="goals-strip">${goalPills}</div>
        </div>`;
    }

    function getUniqueDates(games) {
      const seen = new Set();
      return games.map(g => g.date).filter(d => d && !seen.has(d) && seen.add(d));
    }

    function renderDateButtons(dates) {
      const container = document.getElementById('date-filters');
      container.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.className = 'date-btn' + (activeDate === null ? ' active' : '');
      allBtn.textContent = 'All';
      allBtn.onclick = () => { activeDate = null; renderDateButtons(dates); renderGameCards(); };
      container.appendChild(allBtn);

      dates.forEach(date => {
        const btn = document.createElement('button');
        btn.className = 'date-btn' + (activeDate === date ? ' active' : '');
        btn.textContent = date;
        btn.onclick = () => { activeDate = date; renderDateButtons(dates); renderGameCards(); };
        container.appendChild(btn);
      });
    }

    function renderGameCards() {
      const container = document.getElementById('recent-games');
      container.innerHTML = '';
      const filtered = activeDate === null
        ? allGames
        : allGames.filter(g => g.date === activeDate);
      if (filtered.length === 0) {
        container.innerHTML = '<span style="font-size:14px;color:#999;">No games on this date.</span>';
        return;
      }
      filtered.forEach(game => {
        container.innerHTML += buildGameCard(game, allLogos, allPlayers);
      });
    }

    async function fetchData() {
      const [players, goalies, standings] = await Promise.all([
        fetch(`player_stats.json?cacheBust=${Date.now()}`).then(r => r.json()),
        fetch(`goalie_stats.json?cacheBust=${Date.now()}`).then(r => r.json()),
        fetch(`standings.json?cacheBust=${Date.now()}`).then(r => r.json())
      ]);

      allPlayers = players;

      sortedPlayers = players.map(p => ({
        ...p, pts: p.goals + p.assists, hits: p.hits || 0, touches: p.touches || 0
      })).sort((a,b) => b[currentSortKey] - a[currentSortKey]);

      const teams = [...new Set(players.map(p => p.team))];
      const pFilter = document.getElementById('player-team-filter');
      teams.forEach(t => pFilter.innerHTML += `<option value="${t}">${t}</option>`);
      pFilter.onchange = renderPlayers;

      const c1 = document.getElementById('compare1');
      const c2 = document.getElementById('compare2');
      players.forEach(p => {
        c1.innerHTML += `<option value="${p.player}">${p.player}</option>`;
        c2.innerHTML += `<option value="${p.player}">${p.player}</option>`;
      });
      const doCompare = () => renderComparison(
        sortedPlayers.find(p => p.player === c1.value),
        sortedPlayers.find(p => p.player === c2.value)
      );
      c1.onchange = doCompare; c2.onchange = doCompare;
      renderPlayers(); updateSortArrows();

      sortedGoalies = goalies.map(g => ({
        ...g,
        savePct: g.shotsAgainst > 0 ? g.saves / g.shotsAgainst : 0,
        gaa:     g.gamesPlayed  > 0 ? g.goalsAgainst / g.gamesPlayed : 0
      })).sort((a,b) => b[goalieSortKey] - a[goalieSortKey]);

      const gTeams = [...new Set(goalies.map(g => g.team))];
      const gFilter = document.getElementById('goalie-team-filter');
      gTeams.forEach(t => gFilter.innerHTML += `<option value="${t}">${t}</option>`);
      gFilter.onchange = renderGoalies;
      renderGoalies(); updateGoalieSortArrows();

      const standingsContainer = document.getElementById('standings-tables');
      function groupStandings(type) {
        if (type === 'overall') return { 'League': standings };
        if (type === 'conference') return standings.reduce((acc, t) => {
          (acc[t.conference] = acc[t.conference] || []).push(t); return acc; }, {});
        return standings.reduce((acc, t) => {
          const k = `${t.conference} — ${t.division}`;
          (acc[k] = acc[k] || []).push(t); return acc; }, {});
      }
      function renderStandings(type = 'overall') {
        const grouped = groupStandings(type);
        standingsContainer.innerHTML = '';
        Object.entries(grouped).forEach(([group, ts]) => {
          ts.sort((a,b) => b.points - a.points);
          standingsContainer.innerHTML += `
            <div>
              <h3 class="text-lg font-semibold mb-1">${group}</h3>
              <table class="min-w-full bg-card rounded shadow text-left">
                <thead class="bg-black text-white">
                  <tr>
                    <th class="p-2">Team</th><th class="p-2">W</th><th class="p-2">L</th>
                    <th class="p-2">OTL</th><th class="p-2">PTS</th><th class="p-2">GF</th><th class="p-2">GA</th>
                  </tr>
                </thead>
                <tbody>
                  ${ts.map(t => `<tr class="animate-fadeSlide">
                    <td class="p-2">${t.team}</td><td class="p-2">${t.wins}</td>
                    <td class="p-2">${t.losses}</td><td class="p-2">${t.otl}</td>
                    <td class="p-2">${t.points}</td><td class="p-2">${t.gf}</td><td class="p-2">${t.ga}</td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>`;
        });
      }
      document.getElementById('standings-filter').onchange = e => renderStandings(e.target.value);
      renderStandings();

      try {
        const [games, logos] = await Promise.all([
          fetch('recent_games.json').then(r => r.json()),
          fetch('team_logos.json').then(r => r.json())
        ]);
        allGames = games;
        allLogos = logos;
        const dates = getUniqueDates(games);
        activeDate = dates.length > 0 ? dates[0] : null;
        renderDateButtons(dates);
        renderGameCards();
      } catch(e) {
        console.warn('Could not load recent games or logos:', e);
      }
    }

    fetchData();
  </script>

</body>
</html>
